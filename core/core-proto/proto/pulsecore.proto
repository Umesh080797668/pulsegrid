syntax = "proto3";

package pulsecore;

service PulseCoreService {
  rpc TriggerFlow (TriggerFlowRequest) returns (TriggerFlowResponse);
  rpc SetWorkspaceSecret (SetWorkspaceSecretRequest) returns (SetWorkspaceSecretResponse);
  rpc VerifyWebhookSignature (VerifyWebhookRequest) returns (VerifyWebhookResponse);

  // Phase 2: AI Enhancements
  rpc GenerateFlowFromPrompt (GenerateFlowRequest) returns (GenerateFlowResponse);
  rpc AnalyzeFailure (AnalyzeFailureRequest) returns (AnalyzeFailureResponse);

  // Phase 2: Market
  rpc ListMarketTemplates (ListMarketTemplatesRequest) returns (ListMarketTemplatesResponse);
  rpc InstallTemplate (InstallTemplateRequest) returns (InstallTemplateResponse);

  // STUB Phase 3: Pattern Detection
  rpc DetectPatterns (DetectPatternsRequest) returns (DetectPatternsResponse);
}

message SetWorkspaceSecretRequest {
  string workspace_id = 1;
  string secret_name = 2;
  string secret_value = 3;
}

message SetWorkspaceSecretResponse {
  bool success = 1;
  string message = 2;
}

message VerifyWebhookRequest {
  string workspace_id = 1;
  string raw_payload = 2;
  string provided_signature = 3;
}

message VerifyWebhookResponse {
  bool is_valid = 1;
}

message TriggerFlowRequest {
  string workspace_id = 1;
  string flow_id = 2;
  string payload_json = 3;
}

message TriggerFlowResponse {
  bool success = 1;
  string run_id = 2;
  string message = 3;
}

// -- AI Messages --
message GenerateFlowRequest {
  string prompt = 1;
}

message GenerateFlowResponse {
  bool success = 1;
  string flow_json = 2;
  string error_message = 3;
}

message AnalyzeFailureRequest {
  string error_log = 1;
}

message AnalyzeFailureResponse {
  bool success = 1;
  string analysis = 2;
}

// -- Market Messages --
message ListMarketTemplatesRequest {
  string category = 1;
}

message MarketTemplate {
  string id = 1;
  string title = 2;
  string description = 3;
  int32 price_cents = 4;
}

message ListMarketTemplatesResponse {
  repeated MarketTemplate templates = 1;
}

message InstallTemplateRequest {
  string workspace_id = 1;
  string template_id = 2;
}

message InstallTemplateResponse {
  bool success = 1;
  string new_flow_id = 2;
  string message = 3;
}

// -- STUB: Pattern Detection Messages (Phase 3) --
// These messages are scaffolding for ML-based pattern detection.
// Full implementation will integrate tract ONNX for time-series analysis.
// TODO: Add confidence_min, pattern_types filter parameters for Phase 3

message DetectedPattern {
  string id = 1;
  string workspace_id = 2;
  string pattern_type = 3;  // RepeatedAction, EventCorrelation, Anomaly, TimeBased
  string description = 4;
  float confidence = 5;
  string frequency = 6;
  string suggested_trigger = 7;
  string suggested_actions_json = 8;
  string suggested_flow_json = 9;
  int64 detected_at_unix = 10;
}

message DetectPatternsRequest {
  string workspace_id = 1;
  // STUB: In Phase 3, add: int32 limit = 2, string pattern_type_filter = 3, bool recalculate = 4
}

message DetectPatternsResponse {
  bool success = 1;
  repeated DetectedPattern patterns = 2;
  string error_message = 3;
  // STUB: In Phase 3, add: int64 total_patterns_stored = 4, string last_analysis_time = 5
}

